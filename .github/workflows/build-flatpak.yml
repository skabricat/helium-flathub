name: Build testing Flatpak

on:
  #  workflow_run:
  #  workflows: ["Helium Auto Update"]
  #  types:
  #    - completed
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for recent commits
        id: check_commits
        if: github.event_name != 'workflow_dispatch'
        run: |
          last_commit_time=$(git log -1 --format=%ct)
          current_time=$(date +%s)
          diff=$((current_time - last_commit_time))
          echo "Time since last commit: $diff seconds"
          if [ $diff -le 300 ]; then
            echo "recent_commit=true" >> $GITHUB_OUTPUT
          else
            echo "recent_commit=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Flatpak tools
        if: github.event_name == 'workflow_dispatch' || steps.check_commits.outputs.recent_commit == 'true'
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder

      - name: Install Freedesktop SDK
        if: github.event_name == 'workflow_dispatch' || steps.check_commits.outputs.recent_commit == 'true'
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Sdk//25.08 org.freedesktop.Platform//25.08

      - name: Build Flatpak
        if: github.event_name == 'workflow_dispatch' || steps.check_commits.outputs.recent_commit == 'true'
        run: |
          flatpak-builder --repo=repo build-dir net.imput.helium.yml

